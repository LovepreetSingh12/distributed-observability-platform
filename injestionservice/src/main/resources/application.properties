spring.application.name=injestionservice

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/observability}

ingestion.kafka.topic=observability-events
ingestion.kafka.consumer-group=ingestion-group
ingestion.kafka.concurrency=4
ingestion.kafka.max-poll-records=500

observability.sdk.enabled=true
observability.sdk.kafka-topic=observability-events
observability.sdk.service-name=ingestion-service

management.endpoints.web.exposure.include=health,info,metrics

server.port=8081

logging.level.com.observability=DEBUG